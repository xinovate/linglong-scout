name: Deploy to Server

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'xinovate/linglong-scout'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/linglong-scout
            git -c http.proxy=http://127.0.0.1:7890 pull origin main
            docker compose build
            docker compose up -d
            docker image prune -f
            sleep 3
            docker compose ps
