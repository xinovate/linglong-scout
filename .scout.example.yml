# Linglong Scout 配置模板
# 复制为 .scout.yml 并填入实际值
# 敏感值通过 ${ENV_VAR} 从环境变量注入，不硬编码

debug: false
log_level: "INFO"
# log_file: ~/linglong/logs/scout.log      # 日志文件路径，null 禁用文件日志

# ── LLM ──────────────────────────────────────
llm:
  llm_api_key: ""                         # Or set LL_SCOUT_LLM_API_KEY
  llm_base_url: "https://api.example.com/v1"
  llm_model: ""                            # Required: set via LL_SCOUT_LLM_MODEL or .scout.yml
  llm_temperature: 0.3                    # LLM 采样温度

# ── 信息采集 ──────────────────────────────────
ingest:
  # SearXNG 搜索服务
  searxng_url: "http://localhost:8088"
  searxng_api_key: ${SEARXNG_API_KEY}
  search_timeout: 30

  # RSSHub 实例认证（仅追加到 :1200 端口的 URL）
  rsshub_access_key: ${RSSHUB_ACCESS_KEY}

  # LLM 早报生成
  llm_max_tokens: 8000
  llm_retries: 2
  llm_timeout: 120

  # GitHub 开源趋势
  github_trending_limits:
    daily: 5
    weekly: 3
    monthly: 3
  github_search_fallback:
    since_days: 30
    min_stars: 500

  # 早报去重（按维度回看天数）
  dedup_windows:
    关键人物: 14
    公司动态: 7
    政策动态: 14
    应用落地: 7

  # 早报时段标记
  brief_schedule_time: "07:00"

  # 自动采集（MCP server 启动后按此时间每天采集原始数据，留空禁用）
  collect_schedule: "06:55"

  # 原始数据存储
  raw_data_dir: ~/linglong/data/raw        # JSON 冷存储目录
  raw_redis_ttl_days: 14                   # Redis 热 TTL（天）

  # RSS 订阅源（本地开发可注释掉 RSSHub 源）
  rss_sources:
    - name: AIHOT
      url: https://aihot.virxact.com/feed
    - name: 36氪
      url: https://36kr.com/feed
    # RSSHub 源（需要本地 RSSHub 实例）
    # - name: 36氪快讯
    #   url: http://localhost:1200/36kr/newsflashes
    - name: 量子位
      url: https://www.qbitai.com/feed
    - name: The Rundown AI
      url: https://rss.beehiiv.com/feeds/2R3C6Bt5wj.xml
    # - name: 华尔街见闻快讯
    #   url: http://localhost:1200/wallstreetcn/live
    # - name: 财新网
    #   url: http://localhost:1200/caixin/latest
    - name: TechCrunch AI
      url: https://techcrunch.com/category/artificial-intelligence/feed/
    - name: The Verge AI
      url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    # - name: 工信部文件公示
    #   url: http://localhost:1200/gov/miit/wjgs
    # - name: 发改委新闻动态
    #   url: http://localhost:1200/gov/ndrc/xwdt

  # 采集包定义
  packages:
    - name: ai-morning-brief
      topic: AI 早报
      search_queries:
        # ── 关键人物 ──
        - keywords:
            - "Karpathy AI latest opinion 2026"
            - "LeCun JEPA world model latest"
            - "Ilya Sutskever SSI news 2026"
            - "Geoffrey Hinton AI warning 2026"
            - "Sam Altman OpenAI latest 2026"
            - "Jensen Huang AI latest 2026"
            - "Dario Amodei Anthropic latest 2026"
            - "Demis Hassabis DeepMind latest 2026"
            - "何恺明 AI 最新研究 2026"
            - "李飞飞 AI 最新动态 2026"
            - "Andrew Ng AI opinion 2026"
            - "Jim Fan Nvidia AI latest 2026"
            - "Harrison Chase LangChain latest 2026"
            - "AI 关键人物 动态 2026"
            - "梁文锋 DeepSeek 动态"
            - "周靖人 阿里 AI 动态"
            - "王小川 百川智能 动态"
            - "李开复 零一万物 动态"
          max_results: 3
        # ── 公司动态 ──
        - keywords:
            - "OpenAI GPT latest news May 2026"
            - "Anthropic Claude 4 latest 2026"
            - "Google Gemini 2.5 release 2026"
            - "Meta AI Llama 4 news 2026"
            - "xAI Grok latest news 2026"
            - "DeepSeek R2 最新动态 2026"
            - "月之暗面 Kimi K2 最新动态 2026"
            - "智谱AI GLM 最新动态 2026"
            - "MiniMax 海螺AI 最新动态 2026"
            - "字节跳动 豆包 Seedance 最新动态"
            - "阿里 通义千问 Qwen3 最新动态"
            - "腾讯 混元 Hunyuan 最新动态"
          max_results: 5
        # ── 融资估值 ──
        - keywords:
            - "AI company funding valuation 2026"
            - "OpenAI Anthropic valuation 2026"
            - "AI company stock price change May 2026"
            - "AI 公司融资 估值 2026"
            - "AI 股价 涨跌 2026年5月"
          max_results: 3
        # ── 政策动态 ──
        - keywords:
            - "AI regulation policy 2026"
            - "EU AI Act latest 2026"
            - "AI chip export control 2026"
            - "AI copyright lawsuit 2026"
            - "AI safety governance international 2026"
            - "AI 监管 政策 2026"
            - "生成式AI服务管理 备案 2026"
            - "深度合成内容标识 最新规定"
            - "人工智能立法 进展 2026"
            - "网信办 算法备案 2026"
            - "芯片出口管制 英伟达 最新"
            - "AI 训练数据 版权 诉讼"
            - "AI 安全峰会 治理框架 2026"
            - "国务院 AI 人工智能 政策 2026"
            - "工信部 AI 大模型 备案 最新"
            - "人工智能 治理 国际合作 2026"
          max_results: 5
        # ── 开源趋势 ──
        - keywords:
            - "open source AI model release 2026"
            - "AI open source project new stars"
          max_results: 5
        # ── 应用落地 ──
        - keywords:
            - "Claude Code AI coding agent 2026"
            - "Cursor Windsurf AI coding 2026"
            - "Manus AI agent latest news 2026"
            - "MCP Model Context Protocol latest 2026"
            - "AI agent framework autonomous 2026"
            - "AI video generation Kling Sora 2026"
            - "Unitree robot latest news 2026"
            - "AI 产品发布 2026年5月"
            - "AI Agent 自主智能体 最新"
            - "AI 编程工具 最新 2026"
          max_results: 3

# ── MCP Server ────────────────────────────────
mcp:
  transport: "stdio"                       # stdio（本地）| streamable-http（远程部署）
  host: "127.0.0.1"
  port: 9900
  auth_token: ${LL_MCP_AUTH_TOKEN}         # Bearer token（留空或未设置 = 无认证）
  redis_url: ${REDIS_URL}                  # 远程部署用 Redis 验证 token
  # allowed_hosts:                          # 远程部署需要（DNS rebinding 防护）
  #   - "open.linglong.wiki"
  #   - "127.0.0.1"
  #   - "127.0.0.1:9900"
