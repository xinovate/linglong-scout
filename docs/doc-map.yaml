# 代码路径 → 文档路径映射
# doc-check.py 读取此文件，如果 staged 文件命中 code 路径
# 但本次 commit 没有改动对应 docs，则输出提醒。

mappings:
  - code: src/linglong_scout/scout/
    docs:
      - docs/README.md
      - docs/design/

  - code: src/linglong_scout/mcp/
    docs:
      - docs/README.md
      - docs/design/06-mcp.md

  - code: src/linglong_scout/config.py
    docs:
      - docs/README.md
      - .scout.example.yml

  - code: src/linglong_scout/cli.py
    docs:
      - docs/README.md
