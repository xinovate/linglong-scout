# Linglong Scout — Docker Compose
# 用于替换 systemd 部署，SearXNG/RSSHub/Redis 等服务已在主机运行
#
# 使用：
#   docker compose up -d
#   docker compose logs -f

services:
  scout:
    build: .
    image: linglong-scout:latest
    container_name: linglong-scout
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./data:/root/linglong
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9900/mcp/scout', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
